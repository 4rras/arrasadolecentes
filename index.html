<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Express ⚡</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1d2671,#c33764);
  font-family:Arial, sans-serif;
  color:#fff;
}

.card{
  background:#111;
  width:100%;
  max-width:460px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,.6);
}

h1,h2,h3{margin:10px 0;}

.question{
  font-size:22px;
  font-weight:bold;
  margin:20px 0;
}

input,button{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:14px;
  border:none;
  font-size:16px;
}

button{
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}

.option{
  background:#222;
  color:#fff;
  border:2px solid #444;
}

.option:hover{
  background:#ffcc00;
  color:#000;
}

.correct{background:#2ecc71!important;color:#000;}
.wrong{background:#e74c3c!important;}

.progress-container{
  width:100%;
  height:12px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

.progress-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#ffcc00,#ff6b00);
  transition:width 1s linear;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card" id="captureArea">

<!-- INICIO -->
<div id="start">
  <h1>⚡ Quiz Express ⚡</h1>
  <input id="nameInput" placeholder="Ingresá tu nombre">
  <button onclick="startQuiz()">Comenzar</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <h3 id="playerName"></h3>
  <div id="question" class="question"></div>
  <div id="options"></div>

  <!-- CRONÓMETRO -->
  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>
</div>

<!-- RESULTADO -->
<div id="result" class="hidden">
  <h2>🎉 Resultado 🎉</h2>
  <p id="finalScore"></p>
  <button onclick="takeScreenshot()">📸 Hacer captura</button>
  <button onclick="goHome()">🏠 Ir a inicio</button>
</div>

</div>

<script>
const questions=[
 {q:"¿Planeta más grande?",o:["Tierra","Marte","Júpiter"],a:2},
 {q:"¿Animal más rápido?",o:["Caballo","Guepardo","Perro"],a:1},
 {q:"¿Colores del arcoíris?",o:["5","6","7"],a:2},
 {q:"¿Origen del tango?",o:["España","Argentina","México"],a:1},
 {q:"¿Océano más grande?",o:["Atlántico","Índico","Pacífico"],a:2},
 {q:"¿Metal más liviano?",o:["Hierro","Aluminio","Oro"],a:1}
];

let state=JSON.parse(localStorage.getItem("quiz_state"))||{
  step:"start",
  name:"",
  index:0,
  score:0
};

let usedNames=JSON.parse(localStorage.getItem("used_names"))||[];

let time=10;
let interval;

const startDiv=document.getElementById("start");
const quizDiv=document.getElementById("quiz");
const resultDiv=document.getElementById("result");
const progress=document.getElementById("progress");

function save(){
  localStorage.setItem("quiz_state",JSON.stringify(state));
  localStorage.setItem("used_names",JSON.stringify(usedNames));
}

function show(step){
  startDiv.classList.add("hidden");
  quizDiv.classList.add("hidden");
  resultDiv.classList.add("hidden");

  if(step==="start") startDiv.classList.remove("hidden");
  if(step==="quiz") quizDiv.classList.remove("hidden");
  if(step==="result") resultDiv.classList.remove("hidden");
}

function startQuiz(){
  const name=document.getElementById("nameInput").value.trim();
  if(!name) return alert("Ingresá tu nombre");
  if(usedNames.includes(name.toLowerCase()))
    return alert("❌ Ese nombre ya jugó");

  state={step:"quiz",name,index:0,score:0};
  usedNames.push(name.toLowerCase());
  save();
  show("quiz");
  loadQuestion();
}

function loadQuestion(){
  clearInterval(interval);

  if(state.index>=questions.length){
    finish();
    return;
  }

  document.getElementById("playerName").innerText="👤 "+state.name;
  document.getElementById("question").innerText=
    `${state.index+1}° ${questions[state.index].q}`;

  document.getElementById("options").innerHTML="";
  time=10;
  progress.style.width="100%";

  questions[state.index].o.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=opt;
    b.onclick=()=>answer(b,i);
    document.getElementById("options").appendChild(b);
  });

  interval=setInterval(()=>{
    time--;
    progress.style.width=(time/10*100)+"%";
    if(time===0){
      clearInterval(interval);
      state.index++;
      save();
      loadQuestion();
    }
  },1000);
}

function answer(btn,i){
  clearInterval(interval);
  const correct=questions[state.index].a;

  if(i===correct){
    btn.classList.add("correct");
    state.score++;
  }else{
    btn.classList.add("wrong");
    document.getElementsByClassName("option")[correct].classList.add("correct");
  }

  state.index++;
  save();
  setTimeout(loadQuestion,800);
}

function finish(){
  state.step="result";
  save();
  show("result");
  document.getElementById("finalScore").innerText=
    `${state.name}, acertaste ${state.score} de ${questions.length}`;
}

function takeScreenshot(){
  html2canvas(document.getElementById("captureArea")).then(canvas=>{
    const a=document.createElement("a");
    a.download="resultado-quiz.png";
    a.href=canvas.toDataURL();
    a.click();
  });
}

function goHome(){
  localStorage.removeItem("quiz_state");
  show("start");
  document.getElementById("nameInput").value="";
}

// REANUDAR
show(state.step);
if(state.step==="quiz") loadQuestion();
if(state.step==="result"){
  document.getElementById("finalScore").innerText=
    `${state.name}, acertaste ${state.score} de ${questions.length}`;
}
</script>

</body>
</html>
